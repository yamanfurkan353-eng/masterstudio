version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: masterstudio_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass_change_me}
      MYSQL_DATABASE: ${DB_NAME:-masterstudio_hotel}
      MYSQL_USER: ${DB_USER:-hotel_user}
      MYSQL_PASSWORD: ${DB_PASS:-hotel_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/database.sql:/docker-entrypoint-initdb.d/database.sql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - masterstudio_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build: .
    container_name: masterstudio_php
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER:-hotel_user}
      DB_PASS: ${DB_PASS:-hotel_password}
      DB_NAME: ${DB_NAME:-masterstudio_hotel}
      PHP_ENV: ${PHP_ENV:-production}
    volumes:
      - .:/var/www/html
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - masterstudio_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: masterstudio_phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER:-hotel_user}
      PMA_PASSWORD: ${DB_PASS:-hotel_password}
      UPLOAD_LIMIT: 100M
    ports:
      - "${PMA_PORT:-8080}:80"
    networks:
      - masterstudio_network

volumes:
  mysql_data:

networks:
  masterstudio_network:
    driver: bridge
